services:
  bug-detective:
    build: .
    ports:
      - "17580:17580"
    volumes:
      - ${SOURCE_DIR:-/home/avuser/infernoStart01}:/mnt/source:ro
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - SOURCE_DIR=/mnt/source
    restart: unless-stopped
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
