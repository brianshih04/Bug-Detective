<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug-Detective v2</title>
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #161822;
  --bg-card: #1c1f2e;
  --bg-input: #232636;
  --bg-hover: #2a2d42;
  --bg-active: #333755;
  --border: #2e3148;
  --border-focus: #6c63ff;
  --text-primary: #e4e6f0;
  --text-secondary: #9498b3;
  --text-muted: #6b6f8d;
  --accent: #6c63ff;
  --accent-hover: #7b73ff;
  --accent-glow: rgba(108,99,255,.25);
  --green: #3ddc84;
  --green-bg: rgba(61,220,132,.12);
  --red: #ff6b6b;
  --red-bg: rgba(255,107,107,.12);
  --orange: #ffb347;
  --orange-bg: rgba(255,179,71,.12);
  --cyan: #4ecdc4;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,.35);
  --transition: .2s ease;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
::selection { background: var(--accent); color: #fff; }

/* ========== HEADER ========== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .75rem 1.5rem;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: .75rem; }
.logo {
  font-size: 1.25rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -.02em;
}
.version {
  font-size: .7rem;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-glow);
  padding: .15rem .5rem;
  border-radius: 999px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-size: .75rem;
  padding: .25rem .65rem;
  border-radius: 999px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  transition: var(--transition);
}
.status-badge.online { background: var(--green-bg); border-color: rgba(61,220,132,.3); color: var(--green); }
.status-badge.offline { background: var(--red-bg); border-color: rgba(255,107,107,.3); color: var(--red); }
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: var(--transition);
}
.status-badge.online .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-badge.offline .status-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
.header-right { display: flex; align-items: center; gap: .5rem; }
.icon-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  font-size: 1rem;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-focus); }

/* ========== MAIN LAYOUT ========== */
.main {
  flex: 1;
  display: grid;
  grid-template-columns: 2fr 3fr;
  gap: 1.25rem;
  padding: 1.25rem 1.5rem;
  max-width: 1800px;
  margin: 0 auto;
  width: 100%;
}
.column { display: flex; flex-direction: column; gap: 1rem; min-width: 0; }

/* ========== CARD ========== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.card-header {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .7rem 1rem;
  font-size: .85rem;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}
.card-header .emoji { font-size: 1rem; }
.card-body { padding: 1rem; }
.card-body.collapsible { max-height: 500px; overflow-y: auto; }

/* ========== FORM ELEMENTS ========== */
label {
  display: block;
  font-size: .78rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: .35rem;
  text-transform: uppercase;
  letter-spacing: .04em;
}
textarea, input[type="text"], input[type="password"], select {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: .88rem;
  padding: .6rem .75rem;
  transition: var(--transition);
  outline: none;
  resize: vertical;
}
textarea:focus, input[type="text"]:focus, input[type="password"]:focus, select:focus {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
textarea::placeholder { color: var(--text-muted); }
textarea.log-area {
  font-family: var(--mono);
  font-size: .82rem;
  min-height: 180px;
  line-height: 1.5;
}
textarea.bug-desc {
  min-height: 80px;
}
.form-group { margin-bottom: .85rem; }
.form-group:last-child { margin-bottom: 0; }
.input-row { display: flex; gap: .6rem; align-items: flex-end; }
.input-row .form-group { flex: 1; }
.input-row input[type="text"] { min-width: 0; }

/* ========== DROP ZONE ========== */
.drop-zone {
  position: relative;
}
.drop-zone.dragover textarea {
  border-color: var(--cyan);
  background: rgba(78,205,196,.06);
}
.drop-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(78,205,196,.08);
  border: 2px dashed var(--cyan);
  border-radius: var(--radius-sm);
  align-items: center;
  justify-content: center;
  font-size: .85rem;
  color: var(--cyan);
  pointer-events: none;
  z-index: 2;
}
.drop-zone.dragover .drop-overlay { display: flex; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .45rem;
  font-family: var(--font);
  font-size: .85rem;
  font-weight: 600;
  padding: .55rem 1.1rem;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  outline: none;
  white-space: nowrap;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 0 20px var(--accent-glow); }
.btn-secondary {
  background: var(--bg-input);
  color: var(--text-primary);
  border-color: var(--border);
}
.btn-secondary:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--border-focus); }
.btn-sm { padding: .4rem .75rem; font-size: .78rem; }
.btn-full { width: 100%; }
.btn-group { display: flex; gap: .5rem; }

/* ========== LOADING / SPINNER ========== */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid transparent;
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ========== RESULT CARDS ========== */
.result-placeholder {
  color: var(--text-muted);
  font-size: .82rem;
  text-align: center;
  padding: 2rem 1rem;
}

/* Cleaned data card */
.cleaned-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: .35rem .75rem;
  font-size: .82rem;
}
.cleaned-key {
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}
.cleaned-val { color: var(--text-primary); word-break: break-word; }
.severity-badge {
  display: inline-block;
  font-size: .7rem;
  font-weight: 700;
  padding: .1rem .45rem;
  border-radius: 999px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.severity-badge.low { background: var(--green-bg); color: var(--green); }
.severity-badge.medium { background: var(--orange-bg); color: var(--orange); }
.severity-badge.high { background: var(--red-bg); color: var(--red); }
.severity-badge.critical { background: var(--red-bg); color: var(--red); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
.tag {
  display: inline-block;
  font-size: .68rem;
  padding: .1rem .4rem;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-secondary);
  margin: .1rem;
}

/* Search results */
.search-result-item {
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}
.search-result-item:last-child { border-bottom: none; }
.search-result-header {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .6rem .75rem;
  cursor: pointer;
  transition: var(--transition);
  user-select: none;
}
.search-result-header:hover { background: var(--bg-hover); }
.search-result-arrow {
  font-size: .6rem;
  color: var(--text-muted);
  transition: transform .2s ease;
  flex-shrink: 0;
}
.search-result-item.open .search-result-arrow { transform: rotate(90deg); }
.search-result-header-left {
  flex: 1;
  min-width: 0;
}
.search-result-path {
  font-family: var(--mono);
  font-size: .75rem;
  color: var(--cyan);
  word-break: break-all;
}
.search-result-meta {
  display: flex;
  gap: .75rem;
  font-size: .7rem;
  color: var(--text-muted);
  margin-top: .15rem;
}
.search-result-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .25s ease;
}
.search-result-item.open .search-result-body {
  max-height: 600px;
}
.search-result-text {
  padding: 0 .75rem .65rem 1.6rem;
  font-size: .8rem;
  color: var(--text-secondary);
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  border-left: 2px solid var(--border);
  margin-left: 1rem;
}
/* Collapse all / Expand all */
.search-actions {
  display: flex;
  gap: .4rem;
  margin-left: auto;
}
.search-action-btn {
  font-size: .68rem;
  padding: .15rem .45rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font);
  transition: var(--transition);
}
.search-action-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }
.score-bar {
  display: flex;
  align-items: center;
  gap: .35rem;
}
.score-bar-track {
  width: 50px;
  height: 4px;
  background: var(--bg-primary);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .3s ease;
}
.score-bar-fill.high { background: var(--green); }
.score-bar-fill.medium { background: var(--orange); }
.score-bar-fill.low { background: var(--red); }

/* Analysis card — split thinking + content */
.analysis-split {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  min-height: 200px;
}
.analysis-split.thinking-only {
  grid-template-columns: 1fr;
}
.thinking-panel {
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  max-height: 70vh;
}
.thinking-panel-header {
  display: flex;
  align-items: center;
  gap: .4rem;
  padding: .55rem .75rem;
  font-size: .75rem;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.thinking-panel-header .spinner { width: 10px; height: 10px; border-width: 1.5px; }
.thinking-panel-body {
  flex: 1;
  overflow-y: auto;
  padding: .6rem .75rem;
  font-size: .78rem;
  color: var(--text-muted);
  line-height: 1.5;
  white-space: pre-wrap;
  font-family: var(--mono);
}
.result-panel {
  overflow-y: auto;
  max-height: 70vh;
  padding: 1rem;
}
.analysis-split.thinking-only .thinking-panel {
  border-right: none;
  border-bottom: 1px solid var(--border);
}
.thinking-toggle {
  display: flex;
  align-items: center;
  gap: .4rem;
  cursor: pointer;
  font-size: .78rem;
  color: var(--text-muted);
  padding: .4rem 0;
  user-select: none;
  transition: var(--transition);
}
.thinking-toggle:hover { color: var(--text-secondary); }
.thinking-toggle .arrow { transition: transform .2s ease; font-size: .65rem; }
.thinking-toggle.open .arrow { transform: rotate(90deg); }
.thinking-block {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.thinking-block.open { max-height: 2000px; }
.thinking-content {
  padding: .5rem .75rem;
  margin-bottom: .6rem;
  font-size: .8rem;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-left: 2px solid var(--border);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  line-height: 1.5;
  white-space: pre-wrap;
  font-family: var(--mono);
}
.analysis-content {
  font-size: .88rem;
  line-height: 1.7;
  color: var(--text-primary);
}
.analysis-content h1, .analysis-content h2, .analysis-content h3,
.analysis-content h4, .analysis-content h5, .analysis-content h6 {
  color: var(--text-primary);
  margin: .8rem 0 .4rem;
  line-height: 1.3;
}
.analysis-content h1 { font-size: 1.3rem; }
.analysis-content h2 { font-size: 1.15rem; }
.analysis-content h3 { font-size: 1.05rem; }
.analysis-content p { margin: .4rem 0; }
.analysis-content ul, .analysis-content ol { padding-left: 1.5rem; margin: .4rem 0; }
.analysis-content li { margin: .2rem 0; }
.analysis-content code {
  font-family: var(--mono);
  font-size: .82rem;
  background: var(--bg-input);
  padding: .1rem .35rem;
  border-radius: 3px;
  color: var(--cyan);
}
.analysis-content pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .75rem 1rem;
  overflow-x: auto;
  margin: .5rem 0;
}
.analysis-content pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
  font-size: .8rem;
}
.analysis-content blockquote {
  border-left: 3px solid var(--accent);
  padding: .3rem .75rem;
  margin: .4rem 0;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.analysis-content strong { color: #fff; }
.analysis-content em { color: var(--text-secondary); }
.analysis-content a { color: var(--accent); }
.analysis-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: .7rem 0;
}
.analysis-content table {
  width: 100%;
  border-collapse: collapse;
  margin: .5rem 0;
  font-size: .82rem;
}
.analysis-content th, .analysis-content td {
  border: 1px solid var(--border);
  padding: .35rem .6rem;
  text-align: left;
}
.analysis-content th {
  background: var(--bg-secondary);
  color: var(--text-secondary);
  font-weight: 600;
}

/* Streaming cursor */
.streaming-cursor::after {
  content: '▋';
  animation: blink 1s step-end infinite;
  color: var(--accent);
  margin-left: 1px;
}
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

/* ========== MODAL ========== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 520px;
  max-width: 95vw;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .85rem 1.1rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-secondary);
}
.modal-header h3 { font-size: 1rem; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 1rem;
  transition: var(--transition);
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.modal-body { padding: 1.1rem; }
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: .5rem;
  padding: .75rem 1.1rem;
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}
.preset-btns { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .75rem; }
.preset-btn {
  font-size: .72rem;
  padding: .3rem .65rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font);
}
.preset-btn:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--text-primary); }
.preset-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
.model-dropdown {
  position: relative;
}
.model-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  max-height: 180px;
  overflow-y: auto;
  z-index: 10;
  box-shadow: var(--shadow);
  display: none;
}
.model-list.open { display: block; }
.model-option {
  padding: .45rem .75rem;
  font-size: .82rem;
  cursor: pointer;
  transition: var(--transition);
}
.model-option:hover { background: var(--bg-hover); }
.model-option:first-child { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
.model-option:last-child { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }

/* ========== TOAST ========== */
.toast-container {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 300;
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.toast {
  padding: .6rem 1rem;
  border-radius: var(--radius-sm);
  font-size: .82rem;
  font-weight: 500;
  box-shadow: var(--shadow);
  animation: slideIn .3s ease;
  max-width: 350px;
}
.toast.success { background: var(--green-bg); border: 1px solid rgba(61,220,132,.3); color: var(--green); }
.toast.error { background: var(--red-bg); border: 1px solid rgba(255,107,107,.3); color: var(--red); }
.toast.info { background: var(--accent-glow); border: 1px solid rgba(108,99,255,.3); color: var(--accent); }
@keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }

/* ========== STATUS BAR (streaming) ========== */
.status-line {
  font-size: .78rem;
  color: var(--text-muted);
  padding: .35rem 0;
  display: flex;
  align-items: center;
  gap: .4rem;
}
.status-line .spinner { width: 12px; height: 12px; border-width: 1.5px; }

/* ========== PIPELINE PROGRESS BAR ========== */
.pipeline-progress {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 10px 0 4px 0;
  padding: 0 8px;
}
.pipeline-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
  position: relative;
  z-index: 1;
}
.pipeline-step .step-circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  border: 2px solid var(--border);
  background: var(--bg-input);
  color: var(--text-muted);
  transition: all .3s ease;
  position: relative;
}
.pipeline-step .step-label {
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
  transition: color .3s ease;
}
/* Connector line between steps */
.pipeline-step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 14px;
  left: calc(50% + 14px);
  width: calc(100% - 28px);
  height: 2px;
  background: var(--border);
  z-index: -1;
  transition: background .3s ease;
}
/* Active (currently running) */
.pipeline-step.active .step-circle {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
  animation: stepPulse 1.5s ease-in-out infinite;
}
.pipeline-step.active .step-label {
  color: var(--accent);
}
.pipeline-step.active:not(:last-child)::after {
  background: var(--accent);
  animation: connectorPulse 1.5s ease-in-out infinite;
}
/* Done */
.pipeline-step.done .step-circle {
  border-color: var(--green);
  background: var(--green);
  color: #fff;
}
.pipeline-step.done .step-label {
  color: var(--green);
}
.pipeline-step.done:not(:last-child)::after {
  background: var(--green);
}
/* Error */
.pipeline-step.error .step-circle {
  border-color: var(--red);
  background: var(--red-bg);
  color: var(--red);
}
.pipeline-step.error .step-label {
  color: var(--red);
}

@keyframes stepPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
  50% { box-shadow: 0 0 0 6px transparent; }
}
@keyframes connectorPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Elapsed timer */
.pipeline-timer {
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
}
.pipeline-timer span {
  color: var(--accent);
  font-weight: 600;
}

/* ========== FOOTER ========== */
.footer {
  text-align: center;
  padding: .75rem 1.5rem;
  font-size: .72rem;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}
.footer span { color: var(--text-secondary); }

/* ========== RESPONSIVE ========== */
@media (max-width: 900px) {
  .main {
    grid-template-columns: 1fr;
    padding: 1rem;
  }
}
@media (max-width: 600px) {
  .header { padding: .6rem 1rem; }
  .logo { font-size: 1.05rem; }
  .main { padding: .75rem; gap: .75rem; }
  .modal { width: 98vw; }
}

/* ========== UTILITIES ========== */
.hidden { display: none !important; }
.text-center { text-align: center; }
.mt-1 { margin-top: .5rem; }
.mb-1 { margin-bottom: .5rem; }
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <span class="logo">🐛 Bug-Detective</span>
    <span class="version">v2</span>
    <div class="status-badge" id="statusBadge">
      <span class="status-dot"></span>
      <span id="statusText">檢查中...</span>
    </div>
  </div>
  <div class="header-right">
    <button class="icon-btn" id="btnSettings" title="設定">⚙</button>
  </div>
</header>

<!-- LLM Status Bar -->
<div id="llmStatusBar" style="display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 1.5rem;background:var(--bg-secondary);border-bottom:1px solid var(--border);font-size:12px;color:var(--text-secondary);flex-wrap:wrap;">
  <span id="llmProviderInfo" style="display:flex;align-items:center;gap:5px;">
    <span>🤖</span><span id="llmProviderText">載入中...</span>
  </span>
  <span style="color:var(--border);">|</span>
  <span id="llmModelInfo" style="display:flex;align-items:center;gap:5px;">
    <span>🧠</span><span id="llmModelText">--</span>
  </span>
  <span style="color:var(--border);">|</span>
  <span id="llmKeyInfo" style="display:flex;align-items:center;gap:5px;cursor:pointer;" onclick="openSettings()" title="點擊前往設定">
    <span id="llmKeyIcon">🔴</span><span id="llmKeyText">API Key 未設定</span>
  </span>
</div>

<!-- Main -->
<div class="main">
  <!-- LEFT COLUMN -->
  <div class="column">
    <!-- Bug Description -->
    <div class="card">
      <div class="card-header"><span class="emoji">🎯</span> Bug 描述</div>
      <div class="card-body">
        <div class="form-group drop-zone" id="bugDescDropZone">
          <div class="drop-overlay">📂 拖放描述檔案至此處</div>
          <textarea class="bug-desc" id="bugDesc" placeholder="描述你遇到的 Bug...&#10;&#10;例如：應用程式啟動後，點擊使用者列表時會出現 500 錯誤"></textarea>
        </div>
      </div>
    </div>

    <!-- Log Input -->
    <div class="card">
      <div class="card-header"><span class="emoji">📋</span> Log 內容</div>
      <div class="card-body">
        <div class="form-group drop-zone" id="logDropZone">
          <div class="drop-overlay">📂 拖放日誌檔案至此處</div>
          <textarea class="log-area" id="logText" placeholder="貼上錯誤日誌，或拖放日誌檔案至此處...&#10;&#10;支援純文字、JSON 格式日誌"></textarea>
        </div>
        <div class="btn-group mt-1">
          <div class="form-group" style="flex:0 0 130px;margin-right:.5rem;">
            <select id="topKSelect" title="搜尋結果數量（200K context 可支援大量程式碼）">
              <option value="10">搜尋 10 筆</option>
              <option value="15">搜尋 15 筆</option>
              <option value="20" selected>搜尋 20 筆</option>
              <option value="30">搜尋 30 筆</option>
              <option value="50">搜尋 50 筆</option>
              <option value="80">搜尋 80 筆</option>
              <option value="100">搜尋 100 筆</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <button class="btn btn-primary btn-full" id="btnAnalyze">
              <span id="analyzeIcon">🔍</span>
              <span id="analyzeText">開始分析</span>
            </button>
          </div>
        </div>
        <div id="analyzeStatus" class="hidden">
          <div class="status-line">
            <span class="spinner"></span>
            <span id="analyzeStatusText">正在分析中...</span>
            <span class="pipeline-timer" id="pipelineTimer" style="margin-left:auto;"></span>
          </div>
          <!-- Pipeline visual progress -->
          <div class="pipeline-progress" id="pipelineProgress">
            <div class="pipeline-step" id="pStep0">
              <div class="step-circle">0</div>
              <div class="step-label">去重</div>
            </div>
            <div class="pipeline-step" id="pStep1">
              <div class="step-circle">1</div>
              <div class="step-label">萃取</div>
            </div>
            <div class="pipeline-step" id="pStep2">
              <div class="step-circle">2</div>
              <div class="step-label">語意</div>
            </div>
            <div class="pipeline-step" id="pStep3">
              <div class="step-circle">3</div>
              <div class="step-label">搜尋</div>
            </div>
            <div class="pipeline-step" id="pStep4">
              <div class="step-circle">4</div>
              <div class="step-label">RCA</div>
            </div>
          </div>
          <!-- 5-step pipeline results -->
          <div id="stepsContainer" style="margin-top:6px;display:flex;flex-direction:column;gap:4px;"></div>
        </div>
      </div>
    </div>

    <!-- Quick Search -->
    <div class="card">
      <div class="card-header"><span class="emoji">🔎</span> 快速搜尋</div>
      <div class="card-body">
        <div class="input-row">
          <div class="form-group">
            <input type="text" id="searchQuery" placeholder="搜尋程式碼...">
          </div>
          <div class="form-group" style="flex:0 0 80px;">
            <button class="btn btn-secondary btn-full btn-sm" id="btnSearch">搜尋</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="column">
    <!-- Search Results -->
    <div class="card hidden" id="searchCard">
      <div class="card-header">
        <span class="emoji">📄</span> 搜尋結果
        <div class="search-actions" id="searchActions" style="display:none;">
          <button class="search-action-btn" id="btnExpandAll">展開全部</button>
          <button class="search-action-btn" id="btnCollapseAll">摺疊全部</button>
        </div>
        <span id="searchCount" class="version" style="margin-left:auto;"></span>
      </div>
      <div class="card-body collapsible" id="searchBody"></div>
    </div>

    <!-- Analysis Result -->
    <div class="card hidden" id="analysisCard">
      <div class="card-header"><span class="emoji">🤖</span> AI 分析</div>
      <div class="card-body" style="padding:0;">
        <div class="analysis-split thinking-only" id="analysisSplit">
          <div class="thinking-panel hidden" id="thinkingPanel">
            <div class="thinking-panel-header">
              <span class="spinner" id="thinkingSpinner" style="display:none;"></span>
              <span>💭 思考過程</span>
            </div>
            <div class="thinking-panel-body" id="thinkingPanelBody"></div>
          </div>
          <div class="result-panel">
            <div class="analysis-content" id="analysisContent">
              <div class="result-placeholder">等待分析結果...</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Placeholder when nothing shown -->
    <div class="card" id="placeholderCard">
      <div class="card-body">
        <div class="result-placeholder">
          <div style="font-size: 2.5rem; margin-bottom: .5rem;">🔍</div>
          <div style="margin-bottom: .3rem; color: var(--text-secondary); font-size: .9rem;">準備就緒</div>
          <div>輸入 Bug 描述和日誌後點擊「開始分析」，<br>或使用快速搜尋查詢程式碼</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h3>⚙️ LLM 設定</h3>
      <button class="modal-close" id="btnCloseSettings">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>預設設定</label>
        <div class="preset-btns" id="presetBtns">
          <button class="preset-btn" data-provider="ollama">🦙 Ollama</button>
          <button class="preset-btn" data-provider="glm5">🧠 GLM-5</button>
          <button class="preset-btn" data-provider="openrouter">🌐 OpenRouter</button>
          <button class="preset-btn" data-provider="minimax">⚡ MiniMax</button>
          <button class="preset-btn" data-provider="deepseek">🔮 DeepSeek</button>
        </div>
      </div>
      <div class="form-group">
        <label>Provider</label>
        <select id="cfgProvider">
          <option value="ollama">Ollama (本地)</option>
          <option value="glm5">GLM-5</option>
          <option value="openrouter">OpenRouter</option>
          <option value="minimax">MiniMax</option>
          <option value="deepseek">DeepSeek</option>
          <option value="openai">OpenAI 相容</option>
          <option value="custom">自訂</option>
        </select>
      </div>
      <div class="form-group">
        <label>Base URL</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <input type="text" id="cfgBaseUrl" placeholder="http://localhost:11434" style="flex:1;">
          <button class="btn btn-secondary" id="btnFetchModels" title="根據 Base URL + API Key 抓取可用模型" style="white-space:nowrap;padding:8px 12px;font-size:13px;">🔍 抓取模型</button>
        </div>
      </div>
      <div class="form-group" id="apiKeyGroup">
        <label>API Key <span id="apiKeyHint" style="font-weight:normal;color:#888;font-size:12px;">（Ollama 不需要）</span></label>
        <input type="password" id="cfgApiKey" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>模型</label>
        <div class="model-dropdown">
          <input type="text" id="cfgModel" placeholder="選擇或輸入模型名稱" autocomplete="off">
          <div class="model-list" id="modelList"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btnCancelSettings">取消</button>
      <button class="btn btn-primary" id="btnSaveSettings">💾 儲存設定</button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <span>Bug-Detective v2</span> · FastAPI + RAG + LLM · 繁體中文介面
</footer>

<script>
(function() {
  'use strict';

  const API = '';

  // ===== DOM =====
  const $ = id => document.getElementById(id);
  const statusBadge = $('statusBadge');
  const statusText = $('statusText');
  const bugDesc = $('bugDesc');
  const logText = $('logText');
  const logDropZone = $('logDropZone');
  const bugDescDropZone = $('bugDescDropZone');
  const btnAnalyze = $('btnAnalyze');
  const analyzeIcon = $('analyzeIcon');
  const analyzeText = $('analyzeText');
  const analyzeStatus = $('analyzeStatus');
  const llmProviderText = $('llmProviderText');
  const llmModelText = $('llmModelText');
  const llmKeyIcon = $('llmKeyIcon');
  const llmKeyText = $('llmKeyText');
  const analyzeStatusText = $('analyzeStatusText');
  const stepsContainer = $('stepsContainer');
  const searchQuery = $('searchQuery');
  const btnSearch = $('btnSearch');
  const searchCard = $('searchCard');
  const searchCount = $('searchCount');
  const searchBody = $('searchBody');
  const analysisCard = $('analysisCard');
  const analysisContent = $('analysisContent');
  const analysisSplit = $('analysisSplit');
  const thinkingPanel = $('thinkingPanel');
  const thinkingPanelBody = $('thinkingPanelBody');
  const thinkingSpinner = $('thinkingSpinner');
  const searchActions = $('searchActions');
  const placeholderCard = $('placeholderCard');
  const btnSettings = $('btnSettings');
  const settingsModal = $('settingsModal');
  const btnCloseSettings = $('btnCloseSettings');
  const btnCancelSettings = $('btnCancelSettings');
  const btnSaveSettings = $('btnSaveSettings');
  const cfgProvider = $('cfgProvider');
  const cfgBaseUrl = $('cfgBaseUrl');
  const cfgApiKey = $('cfgApiKey');
  const apiKeyGroup = $('apiKeyGroup');
  const apiKeyHint = $('apiKeyHint');
  const cfgModel = $('cfgModel');
  const modelList = $('modelList');
  const presetBtns = $('presetBtns');

  let currentController = null;
  let isAnalyzing = false;
  let analysisRawText = '';  // accumulate raw markdown for full re-render
  let pipelineStartTime = 0;
  let pipelineTimerInterval = null;

  // ===== TOAST =====
  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    $('toastContainer').appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = '.3s'; setTimeout(() => t.remove(), 300); }, 3000);
  }

  // ===== PIPELINE PROGRESS HELPERS =====
  function startPipelineTimer() {
    pipelineStartTime = Date.now();
    $('pipelineTimer').textContent = '';
    pipelineTimerInterval = setInterval(function() {
      var elapsed = Math.floor((Date.now() - pipelineStartTime) / 1000);
      var min = Math.floor(elapsed / 60);
      var sec = elapsed % 60;
      $('pipelineTimer').innerHTML = '⏱ <span>' + (min > 0 ? min + 'm ' : '') + sec + 's</span>';
    }, 1000);
  }
  function stopPipelineTimer() {
    if (pipelineTimerInterval) {
      clearInterval(pipelineTimerInterval);
      pipelineTimerInterval = null;
    }
    // Keep final time visible
  }
  function resetPipelineProgress() {
    for (var i = 0; i < 5; i++) {
      var el = $('pStep' + i);
      el.className = 'pipeline-step';
    }
    stopPipelineTimer();
    $('pipelineTimer').textContent = '';
  }
  function setPipelineStep(stepNum, state) {
    // stepNum: 0-4, state: 'active', 'done', 'error'
    var el = $('pStep' + stepNum);
    if (!el) return;
    el.className = 'pipeline-step ' + state;
    // If a step becomes active, mark previous ones as done
    if (state === 'active') {
      for (var i = 0; i < stepNum; i++) {
        var prev = $('pStep' + i);
        if (prev && !prev.classList.contains('done')) {
          prev.className = 'pipeline-step done';
        }
      }
    }
  }

  // ===== HEALTH CHECK =====
  async function checkHealth() {
    try {
      const res = await fetch(API + '/api/health');
      if (res.ok) {
        statusBadge.className = 'status-badge online';
        statusText.textContent = '線上';
        return true;
      }
    } catch(e) {}
    statusBadge.className = 'status-badge offline';
    statusText.textContent = '離線';
    return false;
  }

  // ===== DRAG & DROP =====
  function setupDropZone(zone, textarea) {
    ['dragenter','dragover'].forEach(evt => {
      zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.add('dragover'); });
    });
    ['dragleave','drop'].forEach(evt => {
      zone.addEventListener(evt, e => { e.preventDefault(); zone.classList.remove('dragover'); });
    });
    zone.addEventListener('drop', e => {
      const file = e.dataTransfer.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => { textarea.value = ev.target.result; };
        reader.readAsText(file);
        showToast('已載入：' + file.name, 'success');
      }
    });
  }
  setupDropZone(logDropZone, logText);
  setupDropZone(bugDescDropZone, bugDesc);

  // Restore top_k preference from localStorage
  const savedTopK = localStorage.getItem('bugDetective_topK');
  if (savedTopK && $('topKSelect').querySelector('option[value="' + savedTopK + '"]')) {
    $('topKSelect').value = savedTopK;
  }

  // ===== ANALYZE (SSE) =====
  btnAnalyze.addEventListener('click', startAnalyze);

  // API key persisted in browser localStorage (never sent to server disk)
  const API_KEY_STORAGE = 'bugDetective_apiKey';
  let _apiKey = localStorage.getItem(API_KEY_STORAGE) || '';

  // Update LLM status bar (provider, model, API key)
  function updateApiKeyStatus() {
    const key = _apiKey || (cfgApiKey && cfgApiKey.value.trim()) || '';
    const provider = cfgProvider ? cfgProvider.value : '';
    const model = cfgModel ? cfgModel.value : '';

    // Provider label
    const providerLabels = { glm5: 'z.ai (GLM-5)', openrouter: 'OpenRouter', minimax: 'MiniMax', deepseek: 'DeepSeek', ollama: 'Ollama (Local)' };
    llmProviderText.textContent = providerLabels[provider] || provider || '--';

    // Model
    llmModelText.textContent = model || '--';

    // API key status
    if (provider === 'ollama') {
      llmKeyIcon.textContent = '⚪';
      llmKeyText.textContent = '不需要 API Key';
      llmKeyText.style.color = 'var(--text-muted)';
    } else if (key) {
      llmKeyIcon.textContent = '🟢';
      llmKeyText.textContent = 'API Key 已設定';
      llmKeyText.style.color = 'var(--green)';
    } else {
      llmKeyIcon.textContent = '🔴';
      llmKeyText.textContent = 'API Key 未設定';
      llmKeyText.style.color = 'var(--red)';
    }
  }

  async function startAnalyze() {
    if (isAnalyzing) {
      cancelAnalyze();
      return;
    }
    const desc = bugDesc.value.trim();
    const log = logText.value.trim();
    if (!desc && !log) {
      showToast('請輸入 Bug 描述或日誌內容', 'error');
      return;
    }
    // Check API key for non-Ollama providers
    const effectiveKey = _apiKey || (cfgApiKey && cfgApiKey.value.trim()) || '';
    const currentProvider = cfgProvider ? cfgProvider.value : '';
    if (currentProvider !== 'ollama' && !effectiveKey) {
      showToast('⚠️ API Key 未設定！請點擊 🔴 或前往設定填入 API Key', 'error');
      return;
    }
    if (!(await checkHealth())) {
      showToast('後端服務離線，請確認已啟動', 'error');
      return;
    }
    isAnalyzing = true;
    analyzeIcon.innerHTML = '<span class="spinner"></span>';
    analyzeText.textContent = '取消分析';
    analyzeStatus.classList.remove('hidden');
    analyzeStatusText.textContent = '正在分析中...';

    // Reset results
    resetPipelineProgress();
    startPipelineTimer();
    searchCard.classList.add('hidden');
    searchActions.style.display = 'none';
    analysisCard.classList.remove('hidden');
    analysisCard.classList.add('fade-in');
    analysisContent.innerHTML = '';
    analysisRawText = '';
    analysisContent.classList.add('streaming-cursor');
    analysisSplit.classList.add('thinking-only');
    thinkingPanel.classList.add('hidden');
    thinkingPanelBody.textContent = '';
    thinkingSpinner.style.display = 'none';
    placeholderCard.classList.add('hidden');

    currentController = new AbortController();

    try {
      const res = await fetch(API + '/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bug_description: desc, log_text: log, api_key: _apiKey || (cfgApiKey && cfgApiKey.value.trim()) || '', top_k: parseInt($('topKSelect').value) || 20 }),
        signal: currentController.signal
      });

      // Persist top_k preference
      localStorage.setItem('bugDetective_topK', $('topKSelect').value);

      if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const evt = JSON.parse(line);
            handleSSEEvent(evt);
          } catch(e) {
            // ignore parse errors
          }
        }
      }

      // Process remaining buffer
      if (buffer.trim()) {
        try {
          const evt = JSON.parse(buffer);
          handleSSEEvent(evt);
        } catch(e) {}
      }

    } catch(e) {
      if (e.name === 'AbortError') {
        showToast('已取消分析', 'info');
      } else {
        showToast('分析失敗：' + e.message, 'error');
        analysisContent.innerHTML = '<div class="result-placeholder">分析失敗：' + escapeHtml(e.message) + '</div>';
      }
    } finally {
      isAnalyzing = false;
      currentController = null;
      analyzeIcon.innerHTML = '🔍';
      analyzeText.textContent = '開始分析';
      analyzeStatus.classList.add('hidden');
      stopPipelineTimer();
      analysisContent.classList.remove('streaming-cursor');
    }
  }

  // ── Helper: create collapsible code block ──
  function makeCollapsibleBlock(label, borderColor, content) {
    if (!content || (Array.isArray(content) && content.length === 0)) return null;
    var wrap = document.createElement('div');
    wrap.style.cssText = 'margin-top:6px;border-left:3px solid ' + borderColor + ';';
    var toggle = document.createElement('div');
    toggle.style.cssText = 'cursor:pointer;padding:6px 12px;background:#eef2ff;border-radius:4px 4px 0 0;font-size:12px;color:#6366f1;font-weight:600;display:flex;justify-content:space-between;align-items:center;';
    var arrowId = 'arrow_' + Math.random().toString(36).slice(2);
    toggle.innerHTML = '<span>' + label + '</span><span id="' + arrowId + '">▶</span>';
    var box = document.createElement('pre');
    box.style.cssText = 'display:none;padding:12px;margin:0;background:#1e1e2e;color:#cdd6f4;border-radius:0 0 4px 4px;font-size:11px;line-height:1.5;max-height:400px;overflow:auto;white-space:pre-wrap;word-break:break-all;';
    box.textContent = Array.isArray(content) ? content.join('\n') : String(content);
    toggle.onclick = function() {
      var open = box.style.display === 'none';
      box.style.display = open ? 'block' : 'none';
      document.getElementById(arrowId).textContent = open ? '▼' : '▶';
    };
    wrap.appendChild(toggle);
    wrap.appendChild(box);
    return wrap;
  }

  function handleSSEEvent(evt) {
    switch (evt.type) {
      case 'status':
        analyzeStatusText.textContent = evt.text || '處理中...';
        // Drive pipeline progress from status text
        var txt = (evt.text || '');
        if (txt.includes('Step 0') && txt.includes('去重')) setPipelineStep(0, 'active');
        else if (txt.includes('Step 1') || txt.includes('萃取')) setPipelineStep(1, 'active');
        else if (txt.includes('Step 2') || txt.includes('語意')) setPipelineStep(2, 'active');
        else if (txt.includes('Step 3') || txt.includes('Hybrid') || txt.includes('搜尋')) setPipelineStep(3, 'active');
        else if (txt.includes('Step 4') || txt.includes('深度分析') || txt.includes('LLM')) setPipelineStep(4, 'active');
        else if (txt.includes('分析完成') || txt.includes('✅')) {
          // Don't change pipeline from generic ✅ messages
        }
        break;
      // ── New 5-step pipeline events ──
      case 'pipeline_step':
        setPipelineStep(evt.step, evt.state);
        if (evt.detail && evt.state === 'done') {
          analyzeStatusText.textContent += ' [' + evt.detail + ']';
        }
        break;
      case 'step0_result':
        setPipelineStep(0, 'done');
        setPipelineStep(1, 'active');
        var d = evt.data;
        var badge = document.createElement('div');
        badge.className = 'step-badge';
        badge.style.cssText = 'background:#f0f4ff;border-left:3px solid #6366f1;padding:8px 12px;border-radius:4px;font-size:13px;color:#4b5563;';
        badge.innerHTML = '📝 <b>Step 0</b> — Log 去重：' +
          d.original_lines.toLocaleString() + ' → ' + d.condensed_lines.toLocaleString() +
          ' 行（縮減 <b style="color:#16a34a;">' + d.reduction_pct + '%</b>）';
        stepsContainer.appendChild(badge);
        var blk0 = makeCollapsibleBlock('📄 去重後的 Log 內容', '#6366f1', d.condensed_log);
        if (blk0) stepsContainer.appendChild(blk0);
        break;
      case 'step1_result':
        setPipelineStep(1, 'done');
        setPipelineStep(2, 'active');
        renderStep1(evt.data);
        var b1 = document.createElement('div');
        b1.className = 'step-badge';
        b1.style.cssText = 'background:#fef9c3;border-left:3px solid #ca8a04;padding:8px 12px;border-radius:4px;font-size:13px;color:#4b5563;';
        var s1 = evt.data;
        b1.innerHTML = '🔧 <b>Step 1</b> — 萃取：錯誤碼 ' + (s1.error_codes||[]).length +
          ' / 函式 ' + (s1.function_names||[]).length +
          ' / 檔案 ' + (s1.file_paths||[]).length +
          ' / 異常行 ' + (s1.error_lines_count||0);
        stepsContainer.appendChild(b1);
        // Detail blocks
        var parts1 = [];
        if (s1.error_codes && s1.error_codes.length)
          parts1.push('🔴 錯誤碼（' + s1.error_codes.length + '）：\n' + s1.error_codes.join('\n'));
        if (s1.exceptions && s1.exceptions.length)
          parts1.push('⚠️ 異常/信號（' + s1.exceptions.length + '）：\n' + s1.exceptions.join('\n'));
        if (s1.function_names && s1.function_names.length)
          parts1.push('🔧 函式名稱（' + s1.function_names.length + '）：\n' + s1.function_names.join('\n'));
        if (s1.file_paths && s1.file_paths.length)
          parts1.push('📁 檔案路徑（' + s1.file_paths.length + '）：\n' + s1.file_paths.join('\n'));
        if (s1.memory_addresses && s1.memory_addresses.length)
          parts1.push('💾 記憶體位址（' + s1.memory_addresses.length + '）：\n' + s1.memory_addresses.join('\n'));
        if (s1.error_lines && s1.error_lines.length)
          parts1.push('📋 錯誤行（前200）：\n' + s1.error_lines.join('\n'));
        if (parts1.length) {
          var blk1 = makeCollapsibleBlock('🔧 Step 1 萃取結果明細', '#ca8a04', parts1.join('\n\n'));
          if (blk1) stepsContainer.appendChild(blk1);
        }
        break;
      case 'step2_result':
        setPipelineStep(2, 'done');
        setPipelineStep(3, 'active');
        renderStep2(evt.data);
        var b2 = document.createElement('div');
        b2.className = 'step-badge';
        b2.style.cssText = 'background:#fce7f3;border-left:3px solid #db2777;padding:8px 12px;border-radius:4px;font-size:13px;color:#4b5563;';
        var s2 = evt.data;
        b2.innerHTML = '🧠 <b>Step 2</b> — 精確關鍵字 ' + (s2.exact||[]).length +
          ' / 語意關鍵字 ' + (s2.semantic||[]).length;
        stepsContainer.appendChild(b2);
        // Detail block
        var parts2 = [];
        if (s2.summary)
          parts2.push('📝 摘要：\n' + s2.summary);
        if (s2.exact && s2.exact.length)
          parts2.push('🔵 精確關鍵字（' + s2.exact.length + '）：\n' + s2.exact.map(function(k,i){return '  '+(i+1)+'. '+k;}).join('\n'));
        if (s2.semantic && s2.semantic.length)
          parts2.push('🟣 語意關鍵字（' + s2.semantic.length + '）：\n' + s2.semantic.map(function(k,i){return '  '+(i+1)+'. '+k;}).join('\n'));
        if (parts2.length) {
          var blk2 = makeCollapsibleBlock('🧠 Step 2 語意擴充結果', '#db2777', parts2.join('\n\n'));
          if (blk2) stepsContainer.appendChild(blk2);
        }
        break;
      case 'step3_result':
        setPipelineStep(3, 'done');
        setPipelineStep(4, 'active');
        renderSearchResults(evt.data.fused_results || []);
        if (evt.data.keyword_matches !== undefined) {
          searchCount.textContent =
            (evt.data.fused_results || []).length + ' 筆' +
            ' (Keyword: ' + evt.data.keyword_matches +
            ' / Vector: ' + evt.data.vector_matches + ')';
        }
        var b3 = document.createElement('div');
        b3.className = 'step-badge';
        b3.style.cssText = 'background:#dcfce7;border-left:3px solid #16a34a;padding:8px 12px;border-radius:4px;font-size:13px;color:#4b5563;';
        b3.innerHTML = '🔎 <b>Step 3</b> — 搜尋結果：Keyword ' + (evt.data.keyword_matches||0) +
          ' / Vector ' + (evt.data.vector_matches||0) +
          ' / RRF 融合 ' + (evt.data.fused_results||[]).length + ' 筆';
        stepsContainer.appendChild(b3);
        break;
      // ── Legacy events (backward compat) ──
      case 'search_results':
        renderSearchResults(evt.data);
        break;
      case 'thinking':
        analysisSplit.classList.remove('thinking-only');
        thinkingPanel.classList.remove('hidden');
        thinkingSpinner.style.display = '';
        thinkingPanelBody.textContent += evt.text || '';
        // Auto-scroll thinking panel
        thinkingPanelBody.scrollTop = thinkingPanelBody.scrollHeight;
        break;
      case 'content':
        analysisRawText += (evt.text || '');
        analysisContent.innerHTML = renderMarkdown(analysisRawText);
        analysisContent.classList.remove('streaming-cursor');
        if (isAnalyzing) analysisContent.classList.add('streaming-cursor');
        break;
      case 'done':
        setPipelineStep(4, 'done');
        stopPipelineTimer();
        analyzeStatusText.textContent = '分析完成 ✓';
        analysisContent.classList.remove('streaming-cursor');
        thinkingSpinner.style.display = 'none';
        showToast('分析完成', 'success');
        var b4 = document.createElement('div');
        b4.className = 'step-badge';
        b4.style.cssText = 'background:#ede9fe;border-left:3px solid #7c3aed;padding:8px 12px;border-radius:4px;font-size:13px;color:#4b5563;';
        b4.innerHTML = '🚀 <b>Step 4</b> — RCA 深度分析完成';
        stepsContainer.appendChild(b4);
        break;
    }
  }

  // ===== RENDER SEARCH RESULTS (collapsible) =====
  function renderSearchResults(results) {
    if (!results || !results.length) return;
    searchCard.classList.remove('hidden');
    searchCard.classList.add('fade-in');
    searchActions.style.display = '';
    searchCount.textContent = results.length + ' 筆';
    searchBody.innerHTML = '';
    results.forEach((r, idx) => {
      const score = r.score ? (r.score * 100).toFixed(1) : '0';
      const scoreClass = score >= 70 ? 'high' : score >= 40 ? 'medium' : 'low';
      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.dataset.idx = idx;

      const header = document.createElement('div');
      header.className = 'search-result-header';
      header.innerHTML = '<span class="search-result-arrow">\u25B6</span>' +
        '<div class="search-result-header-left">' +
        '<div class="search-result-path">' + escapeHtml(r.file_path || r.file_name || '') + '</div>' +
        '<div class="search-result-meta">' +
        (r.language ? '<span>' + escapeHtml(r.language) + '</span>' : '') +
        '<span class="score-bar">\u76F8\u95DC\u5EA6 <span class="score-bar-track"><span class="score-bar-fill ' + scoreClass + '" style="width:' + Math.min(score, 100) + '%"></span></span> ' + score + '%</span>' +
        '</div></div>';
      header.addEventListener('click', () => item.classList.toggle('open'));
      item.appendChild(header);

      const body = document.createElement('div');
      body.className = 'search-result-body';
      body.innerHTML = '<div class="search-result-text">' + escapeHtml(r.text || '') + '</div>';
      item.appendChild(body);

      searchBody.appendChild(item);
    });
  }

  // ===== MARKDOWN RENDERER (basic) =====
  function renderMarkdown(text) {
    if (!text) return '';
    let html = text;

    // Code blocks (```lang\n...\n```) — handle unclosed blocks in streaming
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
    });
    // Handle unclosed code block (streaming in progress)
    html = html.replace(/```(\w*)\n([\s\S]*)$/g, (_, lang, code) => {
      return '<pre><code>' + escapeHtml(code.trimEnd()) + '</code></pre>';
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, (_, code) => '<code>' + escapeHtml(code) + '</code>');

    // Headers
    html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
    html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
    html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

    // Bold + Italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

    // Blockquote
    html = html.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered list
    html = html.replace(/^[\-\*]\s+(.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

    // Ordered list
    html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
      if (match.indexOf('<ul>') >= 0) return match; // already wrapped by ul
      return '<ol>' + match + '</ol>';
    });

    // Horizontal rule
    html = html.replace(/^---$/gm, '<hr>');

    // Convert remaining newlines to <br> (outside of already-wrapped tags)
    // First, protect existing block-level tags from newline insertion
    let lines = html.split('\n');
    let result = [];
    for (let line of lines) {
      let trimmed = line.trim();
      // Skip lines that are already block-level elements
      if (trimmed.match(/^<(h[1-6]|ul|ol|li|pre|code|blockquote|hr|p|div)/)) {
        result.push(line);
      } else if (trimmed === '') {
        result.push('');
      } else {
        result.push(trimmed + '<br>');
      }
    }
    html = result.join('\n');

    // Clean up consecutive <br> tags
    html = html.replace(/<br>\s*<br>/g, '</p><p>');
    // Clean up blockquote merging
    html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

    return html;
  }

  // ===== HELPERS =====
  function escapeHtml(str) {
    const div = document.createElement('div');
